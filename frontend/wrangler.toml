name = "applemusic-worker"
main = "worker.js"
compatibility_date = "2024-01-01"

# Deployment config
account_id = ""  # Fill in your Cloudflare Account ID
workers_dev = true

# Route config
# route = "applemusic.example.com/*"
# zone_id = ""  # Fill in your Zone ID

# Environment variables
[vars]
API_BACKEND = "https://applemusic-api.example.com"
TURNSTILE_SITE_KEY = "example-turnstile-site-key"

# Deployment notes:
# 
# 1. Install Wrangler CLI:
#    npm install -g wrangler
# 
# 2. Log in to Cloudflare:
#    wrangler login
# 
# 3. Fill in account_id and zone_id if needed
# 
# 4. Test locally:
#    wrangler dev
# 
# 5. Deploy to Cloudflare Workers:
#    wrangler deploy
# 
# 6. Configure a custom domain:
#    Configure Worker routes in the Cloudflare dashboard
#    or uncomment the route and zone_id settings above

